[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

[profile.default.fmt]
line_length = 120
tab_width = 4

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"
arc_mainnet = "${ARC_MAINNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "${ETHERSCAN_API_KEY}" }
